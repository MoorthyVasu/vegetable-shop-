<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Fresh Veggies</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-body">
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <h2>🔐 Admin Login</h2>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <p class="hint">Default: admin / admin123</p>
            </form>
        </div>
    </div>

    <div id="adminPanel" class="admin-panel" style="display: none;">
        <header class="admin-header">
            <div class="container">
                <h1>🛠️ Admin Dashboard</h1>
                <div class="header-actions">
                    <a href="index.html" class="btn btn-secondary">View Site</a>
                    <button onclick="logout()" class="btn btn-danger">Logout</button>
                </div>
            </div>
        </header>

        <main class="container admin-main">
            <div class="admin-grid">
                <!-- Add/Edit Vegetable Section -->
                <section class="admin-card">
                    <h2>🥬 Add New Vegetable</h2>
                    <form id="addVegetableForm" onsubmit="addVegetable(event)">
                        <div class="form-group">
                            <label for="vegName">Vegetable Name (English)</label>
                            <input type="text" id="vegName" required placeholder="e.g., Tomato">
                        </div>
                        <div class="form-group">
                            <label for="vegTamilName">Vegetable Name (Tamil)</label>
                            <input type="text" id="vegTamilName" required placeholder="e.g., தக்காளி">
                        </div>
                        <div class="form-group">
                            <label for="vegPrice">Price (₹/kg)</label>
                            <input type="number" id="vegPrice" required min="1" step="0.5" placeholder="e.g., 40">
                        </div>
                        <div class="form-group">
                            <label for="vegEmoji">Emoji</label>
                            <input type="text" id="vegEmoji" required placeholder="e.g., 🍅" maxlength="4">
                        </div>
                        <button type="submit" class="btn btn-primary">Add Vegetable</button>
                    </form>
                </section>

                <!-- Manage Vegetables Section -->
                <section class="admin-card">
                    <h2>📋 Manage Vegetables</h2>
                    <div class="vegetables-list" id="adminVegetablesList">
                        <!-- Vegetables will be loaded here -->
                    </div>
                </section>

                <!-- Visitor Analytics Section -->
                <section class="admin-card full-width">
                    <h2>📊 Visitor Analytics</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>Total Visits</h3>
                            <p id="totalVisits" class="stat-number">0</p>
                        </div>
                        <div class="stat-card">
                            <h3>Today's Visits</h3>
                            <p id="todayVisits" class="stat-number">0</p>
                        </div>
                        <div class="stat-card">
                            <h3>Unique Visitors</h3>
                            <p id="uniqueVisitors" class="stat-number">0</p>
                        </div>
                    </div>
                    <h3>Recent Visits</h3>
                    <div class="visits-table-container">
                        <table class="visits-table">
                            <thead>
                                <tr>
                                    <th>Date & Time</th>
                                    <th>Page</th>
                                    <th>Device</th>
                                </tr>
                            </thead>
                            <tbody id="visitsTableBody">
                                <!-- Visit records will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                    <button onclick="clearVisitHistory()" class="btn btn-danger btn-small">Clear History</button>
                </section>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-btn" onclick="closeEditModal()">&times;</span>
            <h2>Edit Vegetable</h2>
            <form id="editVegetableForm" onsubmit="saveEditedVegetable(event)">
                <input type="hidden" id="editVegId">
                <div class="form-group">
                    <label for="editVegName">Vegetable Name (English)</label>
                    <input type="text" id="editVegName" required>
                </div>
                <div class="form-group">
                    <label for="editVegTamilName">Vegetable Name (Tamil)</label>
                    <input type="text" id="editVegTamilName" required>
                </div>
                <div class="form-group">
                    <label for="editVegPrice">Price (₹/kg)</label>
                    <input type="number" id="editVegPrice" required min="1" step="0.5">
                </div>
                <div class="form-group">
                    <label for="editVegEmoji">Emoji</label>
                    <input type="text" id="editVegEmoji" required maxlength="4">
                </div>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
